<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>12.06.2026</title>
  
  <!-- Google Fonts: Space Grotesk, Mitr & Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600&family=Outfit:wght@400;700;900&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  
  <!-- FontAwesome & Canvas Confetti -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    :root {
      --bg-color: #fafafa;
      --card-bg: #ffffff;
      --card-border: #111111;
      --card-shadow: #e63946;
      --text-dark: #111111;
      --text-muted: #666666;
      --red-primary: #e63946;
      --red-dark: #b7094c;
      --stat-bg: rgba(255, 255, 255, 0.85);
      --stat-border: #e2e2e2;
      --bar-bg: #f0f0f0;
      --toggle-bg: #ffffff;
      --toggle-border: #111111;
      --particle-opacity: 0.35;
    }

    body.dark-mode {
      --bg-color: #0d0d11;
      --card-bg: #16161e;
      --card-border: #2e2e42;
      --card-shadow: #e63946;
      --text-dark: #f4f4f6;
      --text-muted: #9e9eb4;
      --red-primary: #ff4757;
      --red-dark: #d63031;
      --stat-bg: #1c1c28;
      --stat-border: #2e2e42;
      --bar-bg: #222230;
      --toggle-bg: #1c1c28;
      --toggle-border: #383852;
      --particle-opacity: 0.2;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Space Grotesk', 'Mitr', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      overflow-x: hidden;
      position: relative;
      user-select: none;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    /* Artistic Duotone Background Image Overlay */
    .art-bg-image {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image: url('https://images.unsplash.com/photo-1518199266791-5375a83190b7?q=80&w=1600&auto=format&fit=crop');
      background-size: cover;
      background-position: center;
      filter: grayscale(100%) contrast(120%) brightness(1.1);
      opacity: 0.07;
      pointer-events: none;
    }

    /* Canvas Particles */
    #artCanvas {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    /* Main Editorial Wrapper */
    .editorial-wrapper {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 720px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    /* Dark Mode Toggle Button */
    .theme-toggle {
      position: absolute;
      top: -1.2rem;
      right: 0;
      background: var(--toggle-bg);
      border: 2px solid var(--toggle-border);
      border-radius: 50%;
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.15rem;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      color: var(--red-primary);
      box-shadow: 3px 3px 0px var(--card-border);
      z-index: 20;
    }
    .theme-toggle:hover {
      transform: translate(-2px, -2px) rotate(15deg);
      box-shadow: 5px 5px 0px var(--card-border);
    }

    /* Date Tag Badge */
    .date-tag {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: var(--card-border);
      color: var(--bg-color);
      padding: 0.5rem 1.2rem;
      border-radius: 99px;
      font-size: 0.88rem;
      font-weight: 600;
      letter-spacing: 1px;
      margin-bottom: 2.5rem;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      animation: fadeInDown 0.8s ease forwards;
    }

    .date-tag span {
      color: var(--red-primary);
    }

    /* Giant Artistic Counter Grid */
    .counter-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.25rem;
      width: 100%;
      margin-bottom: 2.5rem;
    }

    @media (max-width: 640px) {
      .counter-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 1rem;
      }
    }

    .counter-card {
      background: var(--card-bg);
      border: 2px solid var(--card-border);
      border-radius: 20px;
      padding: 1.75rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      box-shadow: 6px 6px 0px var(--card-shadow);
      transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .counter-card:hover {
      transform: translate(-3px, -3px);
      box-shadow: 10px 10px 0px var(--card-border);
    }

    .num-val {
      font-family: 'Outfit', sans-serif;
      font-size: 3.6rem;
      font-weight: 900;
      line-height: 1;
      color: var(--text-dark);
      letter-spacing: -1px;
    }

    .counter-card:first-child .num-val {
      color: var(--red-primary);
    }

    .num-label {
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      margin-top: 0.6rem;
    }

    /* Subtle Minute Progress Cycle Bar */
    .minute-cycle-wrap {
      width: 100%;
      max-width: 480px;
      margin-bottom: 2.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .minute-cycle-label {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      display: flex;
      justify-content: space-between;
    }

    .minute-bar-bg {
      width: 100%;
      height: 6px;
      background: var(--bar-bg);
      border-radius: 99px;
      overflow: hidden;
      position: relative;
    }

    .minute-bar-fill {
      height: 100%;
      width: 0%;
      background: var(--red-primary);
      border-radius: 99px;
      transition: width 0.3s ease;
    }

    /* Artistic Stats Grid (2 Clean Items) */
    .art-stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.25rem;
      width: 100%;
      margin-bottom: 2.5rem;
    }

    @media (max-width: 480px) {
      .art-stats {
        grid-template-columns: 1fr;
      }
    }

    .stat-item {
      background: var(--stat-bg);
      border: 1.5px dashed var(--stat-border);
      border-radius: 18px;
      padding: 1.35rem 1rem;
      text-align: center;
      transition: border-color 0.2s ease, background 0.3s ease;
    }

    .stat-item:hover {
      border-color: var(--red-primary);
    }

    .stat-val {
      font-family: 'Outfit', sans-serif;
      font-size: 1.65rem;
      font-weight: 700;
      color: var(--red-primary);
      margin-bottom: 0.2rem;
    }

    .stat-desc {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    /* Action Heart Button */
    .heart-action-btn {
      background: var(--red-primary);
      color: #ffffff;
      border: 2px solid var(--card-border);
      border-radius: 99px;
      padding: 1rem 2.2rem;
      font-family: inherit;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      box-shadow: 5px 5px 0px var(--card-border);
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .heart-action-btn:hover {
      transform: translate(-2px, -2px);
      box-shadow: 8px 8px 0px var(--card-border);
      background: var(--red-dark);
    }

    .heart-action-btn:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0px var(--card-border);
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-15px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- Duotone Background Image Overlay -->
  <div class="art-bg-image"></div>

  <!-- Canvas Particles -->
  <canvas id="artCanvas"></canvas>

  <!-- Editorial Main Container -->
  <div class="editorial-wrapper">

    <!-- Dark Mode Toggle Button -->
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="สลับ Dark / Light Mode">🌙</button>

    <!-- Date Badge Tag -->
    <div class="date-tag">
      <i class="fa-solid fa-heart" style="color:var(--red-primary);"></i>
      <span>12.06.2026 02:00 AM</span> — PRESENT
    </div>

    <!-- Giant Artistic Counter Grid -->
    <div class="counter-grid">
      <div class="counter-card">
        <span class="num-val" id="daysVal">00</span>
        <span class="num-label">DAYS</span>
      </div>
      <div class="counter-card">
        <span class="num-val" id="hoursVal">00</span>
        <span class="num-label">HOURS</span>
      </div>
      <div class="counter-card">
        <span class="num-val" id="minsVal">00</span>
        <span class="num-label">MINS</span>
      </div>
      <div class="counter-card">
        <span class="num-val" id="secsVal">00</span>
        <span class="num-label">SECS</span>
      </div>
    </div>

    <!-- Minimal Minute Cycle Progress Bar -->
    <div class="minute-cycle-wrap">
      <div class="minute-cycle-label">
        <span>Minute Cycle</span>
        <span id="minuteSecLabel">0s / 60s</span>
      </div>
      <div class="minute-bar-bg">
        <div class="minute-bar-fill" id="minuteBarFill"></div>
      </div>
    </div>

    <!-- Artistic Stats Grid (Heartbeats & Total Seconds) -->
    <div class="art-stats">
      <div class="stat-item">
        <div class="stat-val" id="heartbeatsVal">0</div>
        <div class="stat-desc">❤️ Heartbeats Shared</div>
      </div>
      <div class="stat-item">
        <div class="stat-val" id="secondsVal">0</div>
        <div class="stat-desc">⏱️ Total Seconds</div>
      </div>
    </div>

    <!-- Interactive Heart Button -->
    <button class="heart-action-btn" onclick="triggerHeartBurst(event)">
      <i class="fa-solid fa-heart"></i> TAP TO SEND LOVE
    </button>

  </div>

  <script>
    // Theme Toggle Logic
    const themeToggle = document.getElementById('themeToggle');
    
    function applyTheme(isDark) {
      if (isDark) {
        document.body.classList.add('dark-mode');
        themeToggle.textContent = '☀️';
      } else {
        document.body.classList.remove('dark-mode');
        themeToggle.textContent = '🌙';
      }
    }

    function toggleTheme() {
      const isDark = !document.body.classList.contains('dark-mode');
      applyTheme(isDark);
      localStorage.setItem('loveCounterDarkTheme', isDark ? 'true' : 'false');
    }

    // Load saved theme or system preference
    const savedTheme = localStorage.getItem('loveCounterDarkTheme');
    if (savedTheme !== null) {
      applyTheme(savedTheme === 'true');
    } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
      applyTheme(true);
    }

    // Start Date: 12 June 2026 (02:00:00 AM)
    const START_DATE = new Date("2026-06-12T02:00:00");

    // Elements
    const daysVal = document.getElementById("daysVal");
    const hoursVal = document.getElementById("hoursVal");
    const minsVal = document.getElementById("minsVal");
    const secsVal = document.getElementById("secsVal");
    const minuteBarFill = document.getElementById("minuteBarFill");
    const minuteSecLabel = document.getElementById("minuteSecLabel");
    const heartbeatsVal = document.getElementById("heartbeatsVal");
    const secondsVal = document.getElementById("secondsVal");

    // Update Counter Loop
    function updateCounter() {
      const now = new Date();
      const diffMs = Math.max(0, now - START_DATE);

      const secondsTotal = Math.floor(diffMs / 1000);
      const days = Math.floor(secondsTotal / (3600 * 24));
      const hours = Math.floor((secondsTotal % (3600 * 24)) / 3600);
      const mins = Math.floor((secondsTotal % 3600) / 60);
      const secs = secondsTotal % 60;

      daysVal.textContent = String(days).padStart(2, '0');
      hoursVal.textContent = String(hours).padStart(2, '0');
      minsVal.textContent = String(mins).padStart(2, '0');
      secsVal.textContent = String(secs).padStart(2, '0');

      // Minimal 60-second minute cycle bar
      const secProgress = (secs / 60) * 100;
      minuteBarFill.style.width = secProgress + '%';
      minuteSecLabel.textContent = `${secs}s / 60s`;

      // Fun stats calculation (approx 70 bpm)
      const heartbeats = Math.floor(secondsTotal * 1.166);

      heartbeatsVal.textContent = heartbeats.toLocaleString();
      secondsVal.textContent = secondsTotal.toLocaleString();

      requestAnimationFrame(updateCounter);
    }

    // Trigger Heart Burst Confetti on Click
    function triggerHeartBurst(e) {
      const x = e ? e.clientX / window.innerWidth : 0.5;
      const y = e ? e.clientY / window.innerHeight : 0.5;

      confetti({
        particleCount: 50,
        spread: 60,
        origin: { x: x, y: y },
        colors: ['#e63946', '#ff4757', '#ffffff', '#b7094c']
      });
    }

    // Floating Red Ink Particles on Canvas
    const canvas = document.getElementById('artCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 3 + 1;
        this.speedY = Math.random() * -0.6 - 0.2;
        this.opacity = Math.random() * 0.4 + 0.1;
      }
      update() {
        this.y += this.speedY;
        if (this.y < -10) {
          this.y = canvas.height + 10;
          this.x = Math.random() * canvas.width;
        }
      }
      draw() {
        ctx.fillStyle = `rgba(230, 57, 70, ${this.opacity})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    for (let i = 0; i < 35; i++) {
      particles.push(new Particle());
    }

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        p.update();
        p.draw();
      });
      requestAnimationFrame(animateParticles);
    }

    // Click anywhere for ripples
    window.addEventListener('click', (e) => {
      if (e.target.tagName !== 'BUTTON' && e.target.tagName !== 'A') {
        confetti({
          particleCount: 15,
          spread: 40,
          origin: { x: e.clientX / window.innerWidth, y: e.clientY / window.innerHeight },
          colors: ['#e63946', '#b7094c']
        });
      }
    });

    // Start
    updateCounter();
    animateParticles();
  </script>
</body>
</html>
