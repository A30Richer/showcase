<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>12.06.2026</title>
  
  <!-- Google Fonts: Space Grotesk, Mitr & Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600&family=Outfit:wght@400;700;900&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  
  <!-- FontAwesome & Canvas Confetti -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    :root {
      --bg-white: #fafafa;
      --red-primary: #e63946;
      --red-dark: #b7094c;
      --red-soft: rgba(230, 57, 70, 0.08);
      --text-dark: #111111;
      --text-muted: #666666;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Space Grotesk', 'Mitr', sans-serif;
      background-color: var(--bg-white);
      color: var(--text-dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      overflow-x: hidden;
      position: relative;
      user-select: none;
    }

    /* Artistic Duotone Background Image Overlay */
    .art-bg-image {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image: url('https://images.unsplash.com/photo-1518199266791-5375a83190b7?q=80&w=1600&auto=format&fit=crop');
      background-size: cover;
      background-position: center;
      filter: grayscale(100%) contrast(120%) brightness(1.1);
      opacity: 0.07;
      pointer-events: none;
    }

    /* Canvas Particles */
    #artCanvas {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    /* Main Editorial Wrapper */
    .editorial-wrapper {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 720px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    /* Date Tag Badge */
    .date-tag {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: var(--text-dark);
      color: #ffffff;
      padding: 0.5rem 1.2rem;
      border-radius: 99px;
      font-size: 0.88rem;
      font-weight: 600;
      letter-spacing: 1px;
      margin-bottom: 2.5rem;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      animation: fadeInDown 0.8s ease forwards;
    }

    .date-tag span {
      color: var(--red-primary);
    }

    /* Giant Artistic Counter Grid */
    .counter-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.25rem;
      width: 100%;
      margin-bottom: 3rem;
    }

    @media (max-width: 640px) {
      .counter-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 1rem;
      }
    }

    .counter-card {
      background: #ffffff;
      border: 2px solid var(--text-dark);
      border-radius: 20px;
      padding: 1.75rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      box-shadow: 6px 6px 0px var(--red-primary);
      transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .counter-card:hover {
      transform: translate(-3px, -3px);
      box-shadow: 10px 10px 0px var(--text-dark);
    }

    .num-val {
      font-family: 'Outfit', sans-serif;
      font-size: 3.6rem;
      font-weight: 900;
      line-height: 1;
      color: var(--text-dark);
      letter-spacing: -1px;
    }

    .counter-card:first-child .num-val {
      color: var(--red-primary);
    }

    .num-label {
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      margin-top: 0.6rem;
    }

    /* Live Milliseconds Bar */
    .ms-bar-container {
      width: 100%;
      background: #ffffff;
      border: 2px solid var(--text-dark);
      border-radius: 99px;
      padding: 4px;
      margin-bottom: 3rem;
      box-shadow: 4px 4px 0px var(--text-dark);
    }

    .ms-bar-fill {
      height: 10px;
      background: var(--red-primary);
      border-radius: 99px;
      width: 50%;
      transition: width 0.05s linear;
    }

    /* Artistic Stats Grid */
    .art-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.25rem;
      width: 100%;
      margin-bottom: 2.5rem;
    }

    @media (max-width: 640px) {
      .art-stats {
        grid-template-columns: 1fr;
      }
    }

    .stat-item {
      background: rgba(255, 255, 255, 0.8);
      border: 1.5px dashed #dddddd;
      border-radius: 16px;
      padding: 1.25rem;
      text-align: center;
      transition: border-color 0.2s ease;
    }

    .stat-item:hover {
      border-color: var(--red-primary);
      background: #ffffff;
    }

    .stat-val {
      font-family: 'Outfit', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--red-primary);
      margin-bottom: 0.2rem;
    }

    .stat-desc {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    /* Action Heart Button */
    .heart-action-btn {
      background: var(--red-primary);
      color: #ffffff;
      border: 2px solid var(--text-dark);
      border-radius: 99px;
      padding: 1rem 2.2rem;
      font-family: inherit;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      box-shadow: 5px 5px 0px var(--text-dark);
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .heart-action-btn:hover {
      transform: translate(-2px, -2px);
      box-shadow: 8px 8px 0px var(--text-dark);
      background: var(--red-dark);
    }

    .heart-action-btn:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0px var(--text-dark);
    }

    /* Back Link */
    .back-nav {
      margin-top: 2rem;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      transition: color 0.2s ease;
    }

    .back-nav:hover {
      color: var(--red-primary);
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-15px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- Duotone Background Image Overlay -->
  <div class="art-bg-image"></div>

  <!-- Canvas Particles -->
  <canvas id="artCanvas"></canvas>

  <!-- Editorial Main Container -->
  <div class="editorial-wrapper">

    <!-- Date Badge Tag -->
    <div class="date-tag">
      <i class="fa-solid fa-heart" style="color:var(--red-primary);"></i>
      <span>12.06.2026 02:00 AM</span> — PRESENT
    </div>

    <!-- Giant Artistic Counter Grid -->
    <div class="counter-grid">
      <div class="counter-card">
        <span class="num-val" id="daysVal">00</span>
        <span class="num-label">DAYS</span>
      </div>
      <div class="counter-card">
        <span class="num-val" id="hoursVal">00</span>
        <span class="num-label">HOURS</span>
      </div>
      <div class="counter-card">
        <span class="num-val" id="minsVal">00</span>
        <span class="num-label">MINS</span>
      </div>
      <div class="counter-card">
        <span class="num-val" id="secsVal">00</span>
        <span class="num-label">SECS</span>
      </div>
    </div>

    <!-- Live Milliseconds Bar -->
    <div class="ms-bar-container" title="Live Milliseconds Ticker">
      <div class="ms-bar-fill" id="msBarFill"></div>
    </div>

    <!-- Fun Artistic Stats -->
    <div class="art-stats">
      <div class="stat-item">
        <div class="stat-val" id="heartbeatsVal">0</div>
        <div class="stat-desc">❤️ Heartbeats Shared</div>
      </div>
      <div class="stat-item">
        <div class="stat-val" id="secondsVal">0</div>
        <div class="stat-desc">⏱️ Total Seconds</div>
      </div>
      <div class="stat-item">
        <div class="stat-val" id="coffeesVal">0</div>
        <div class="stat-desc">☕ Coffee Cups Together</div>
      </div>
    </div>

    <!-- Interactive Heart Button -->
    <button class="heart-action-btn" onclick="triggerHeartBurst(event)">
      <i class="fa-solid fa-heart"></i> TAP TO SEND LOVE
    </button>

    <!-- Back to Showcase Portal -->
    <a href="index.html" class="back-nav">
      <i class="fa-solid fa-arrow-left"></i> SHOWCASE PORTAL
    </a>

  </div>

  <script>
    // Start Date: 12 June 2026 (02:00:00 AM)
    const START_DATE = new Date("2026-06-12T02:00:00");

    // Elements
    const daysVal = document.getElementById("daysVal");
    const hoursVal = document.getElementById("hoursVal");
    const minsVal = document.getElementById("minsVal");
    const secsVal = document.getElementById("secsVal");
    const msBarFill = document.getElementById("msBarFill");
    const heartbeatsVal = document.getElementById("heartbeatsVal");
    const secondsVal = document.getElementById("secondsVal");
    const coffeesVal = document.getElementById("coffeesVal");

    // Update Counter Loop
    function updateCounter() {
      const now = new Date();
      const diffMs = Math.max(0, now - START_DATE);

      const secondsTotal = Math.floor(diffMs / 1000);
      const days = Math.floor(secondsTotal / (3600 * 24));
      const hours = Math.floor((secondsTotal % (3600 * 24)) / 3600);
      const mins = Math.floor((secondsTotal % 3600) / 60);
      const secs = secondsTotal % 60;
      const ms = diffMs % 1000;

      daysVal.textContent = String(days).padStart(2, '0');
      hoursVal.textContent = String(hours).padStart(2, '0');
      minsVal.textContent = String(mins).padStart(2, '0');
      secsVal.textContent = String(secs).padStart(2, '0');

      // Live ms bar fill
      msBarFill.style.width = (ms / 10) + '%';

      // Fun stats calculation (approx 70 bpm)
      const heartbeats = Math.floor(secondsTotal * 1.166);
      const coffees = Math.floor(days * 2.5);

      heartbeatsVal.textContent = heartbeats.toLocaleString();
      secondsVal.textContent = secondsTotal.toLocaleString();
      coffeesVal.textContent = coffees.toLocaleString();

      requestAnimationFrame(updateCounter);
    }

    // Trigger Heart Burst Confetti on Click
    function triggerHeartBurst(e) {
      const x = e ? e.clientX / window.innerWidth : 0.5;
      const y = e ? e.clientY / window.innerHeight : 0.5;

      confetti({
        particleCount: 50,
        spread: 60,
        origin: { x: x, y: y },
        colors: ['#e63946', '#b7094c', '#ffffff', '#111111']
      });
    }

    // Floating Red Ink Particles on Canvas
    const canvas = document.getElementById('artCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 3 + 1;
        this.speedY = Math.random() * -0.6 - 0.2;
        this.opacity = Math.random() * 0.4 + 0.1;
      }
      update() {
        this.y += this.speedY;
        if (this.y < -10) {
          this.y = canvas.height + 10;
          this.x = Math.random() * canvas.width;
        }
      }
      draw() {
        ctx.fillStyle = `rgba(230, 57, 70, ${this.opacity})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    for (let i = 0; i < 35; i++) {
      particles.push(new Particle());
    }

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        p.update();
        p.draw();
      });
      requestAnimationFrame(animateParticles);
    }

    // Click anywhere for ripples
    window.addEventListener('click', (e) => {
      if (e.target.tagName !== 'BUTTON' && e.target.tagName !== 'A') {
        confetti({
          particleCount: 15,
          spread: 40,
          origin: { x: e.clientX / window.innerWidth, y: e.clientY / window.innerHeight },
          colors: ['#e63946', '#b7094c']
        });
      }
    });

    // Start
    updateCounter();
    animateParticles();
  </script>
</body>
</html>
